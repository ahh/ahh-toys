name: Twitter Curator

on:
  # Cron disabled until tweet sourcing is reworked (Twitter List). Re-enable
  # by uncommenting the schedule block below.
  # schedule:
  #   - cron: '0 */3 * * *'   # Every 3 hours, UTC
  workflow_dispatch: # Manual trigger for testing

permissions:
  contents: write

jobs:
  curate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: twitter-curator/requirements.txt

      - name: Install dependencies
        run: pip install -r twitter-curator/requirements.txt

      - name: Run curator
        env:
          TWITTER_COOKIES: ${{ secrets.TWITTER_COOKIES }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TWITTER_SCORING_PROMPT: ${{ secrets.TWITTER_SCORING_PROMPT }}
        run: |
          cd twitter-curator
          python curator.py

      - name: Commit and push state.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --staged --quiet || git commit -m "chore: update curator state [skip ci]"
          git push
